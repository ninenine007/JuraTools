  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"056471f9-614b-4fac-b5b1-f27861f7348c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; height: 100%; }\n  body { background:#e7e5df; }\n  ::selection { background: rgba(201,151,30,0.28); }\n  .reading h1 { font-size: 1.5em; font-weight:600; line-height:1.3; margin:1.1em 0 0.5em; }\n  .reading h2 { font-size: 1.25em; font-weight:600; line-height:1.35; margin:1em 0 0.4em; }\n  .reading h3 { font-size: 1.08em; font-weight:600; margin:0.9em 0 0.3em; }\n  .reading p { margin: 0 0 1.05em; }\n  .reading blockquote { margin:1em 0; padding:0.2em 0 0.2em 1.1em; border-left:3px solid #d8cdb4; color:#5a5142; font-style:italic; }\n  .reading ul, .reading ol { margin:0 0 1.05em; padding-left:1.5em; }\n  .reading li { margin:0.2em 0; }\n  .reading:focus { outline: none; }\n  .reading[contenteditable=\"true\"]:empty:before { content:\"Type or paste your text here…\"; color:#b3a78f; }\n  @keyframes flashmark { 0%,100%{ box-shadow:0 0 0 0 rgba(0,0,0,0);} 25%{ box-shadow:0 0 0 4px rgba(201,151,30,0.55);} }\n  .scroll::-webkit-scrollbar{ width:11px; }\n  .scroll::-webkit-scrollbar-thumb{ background:#d6cab2; border-radius:6px; border:3px solid transparent; background-clip:padding-box; }\n  .ui{ font-family:'Sarabun', system-ui, sans-serif; }\n  textarea.note{ font-family:'Sarabun', system-ui, sans-serif; }\n  .comment-edit:empty:before { content: attr(data-placeholder); color: #b3a78f; pointer-events: none; display: block; }\n  .comment-edit ul, .comment-edit ol { padding-left: 1.4em; margin: 0.3em 0; }\n  .comment-edit li { margin: 0.15em 0; }\n  .comment-edit strong, .comment-edit b { font-weight: 700; }\n  .comment-edit em, .comment-edit i { font-style: italic; }\n  .comment-edit u { text-decoration: underline; }\n  .comment-edit blockquote { margin: 0.4em 0; padding: 0.1em 0 0.1em 0.9em; border-left: 3px solid #d8cdb4; color: #5a5142; font-style: italic; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"ui\" style=\"display:flex; flex-direction:column; height:100vh; background:#ece4d4; color:#2b2620;\">\n\n  <!-- ===== HEADER ===== -->\n  <div style=\"flex:none; display:flex; align-items:center; gap:18px; padding:0 18px; height:54px; background:#f1ead9; border-bottom:1px solid #ddd0b3;\">\n    <div style=\"display:flex; align-items:baseline; gap:9px;\">\n      <span style=\"font-family:'Spectral',serif; font-size:19px; font-weight:600; letter-spacing:0.01em; color:#2b2620;\">Marginalia<\u002Fspan>\n      <span style=\"font-size:10.5px; letter-spacing:0.22em; text-transform:uppercase; color:#a08c5e; font-weight:600;\">notes &amp; tags<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; display:flex; justify-content:center;\">\n      <input value=\"{{ activeTitle }}\" oninput=\"{{ onTitle }}\" placeholder=\"Untitled document\" style=\"width:min(440px,90%); text-align:center; font-family:'Spectral',serif; font-size:16px; color:#2b2620; background:transparent; border:none; border-bottom:1px solid transparent; padding:4px 6px;\" style-focus=\"border-bottom:1px solid #cdbd98; outline:none;\">\n    <\u002Fdiv>\n\n    <!-- mode toggle -->\n    <div style=\"display:flex; background:#e6dcc4; border-radius:6px; padding:2px;\">\n      <button onclick=\"{{ setRead }}\" style=\"{{ readBtnStyle }}\">Read<\u002Fbutton>\n      <button onclick=\"{{ setEdit }}\" style=\"{{ editBtnStyle }}\">Edit<\u002Fbutton>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ toggleTagMgr }}\" style=\"font-size:12.5px; color:#6b6151; background:transparent; border:1px solid #d8cdb4; border-radius:6px; padding:6px 11px; cursor:pointer;\" style-hover=\"background:#e9e0cb;\">Tags<\u002Fbutton>\n\n    <div style=\"position:relative;\">\n      <button onclick=\"{{ toggleExport }}\" style=\"font-size:12.5px; color:#6b6151; background:transparent; border:1px solid #d8cdb4; border-radius:6px; padding:6px 11px; cursor:pointer;\" style-hover=\"background:#e9e0cb;\">Export ▾<\u002Fbutton>\n      <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; right:0; top:38px; z-index:40; width:212px; background:#fff; border:1px solid #e2d7c0; border-radius:8px; box-shadow:0 8px 24px rgba(60,50,30,.18); padding:6px; display:flex; flex-direction:column;\">\n          <button onclick=\"{{ exportMd }}\" style=\"text-align:left; font-size:13px; color:#3a342b; background:transparent; border:none; border-radius:5px; padding:8px 10px; cursor:pointer;\" style-hover=\"background:#f3ecdd;\">Download notes (Markdown)<\u002Fbutton>\n          <button onclick=\"{{ copyNotes }}\" style=\"text-align:left; font-size:13px; color:#3a342b; background:transparent; border:none; border-radius:5px; padding:8px 10px; cursor:pointer;\" style-hover=\"background:#f3ecdd;\">Copy notes to clipboard<\u002Fbutton>\n          <div style=\"height:1px; background:#eee2cd; margin:4px 6px;\"><\u002Fdiv>\n          <button onclick=\"{{ exportJson }}\" style=\"text-align:left; font-size:13px; color:#3a342b; background:transparent; border:none; border-radius:5px; padding:8px 10px; cursor:pointer;\" style-hover=\"background:#f3ecdd;\">Back up everything (.json)<\u002Fbutton>\n          <button onclick=\"{{ triggerImport }}\" style=\"text-align:left; font-size:13px; color:#3a342b; background:transparent; border:none; border-radius:5px; padding:8px 10px; cursor:pointer;\" style-hover=\"background:#f3ecdd;\">Restore from backup…<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== BODY ===== -->\n  <div style=\"flex:1; display:flex; min-height:0;\">\n\n    <!-- LEFT RAIL: documents -->\n    <div style=\"flex:none; width:212px; background:#e9e0cb " style=\"width:30px; height:30px; font-family:'Spectral',serif; font-weight:700; font-size:15px; color:#5a5142; background:transparent; border:1px solid #ddd0b3; border-radius:5px; cursor:pointer;\" style-hover=\"background:#e3d8bf;\">B<\u002Fbutton>\n          <button onmousedown=\"{{ prevent }}\" onclick=\"{{ expandFmtItalic }}\" title=\"Italic\" style=\"width:30px; height:30px; font-family:'Spectral',serif; font-style:italic; font-size:15px; color:#5a5142; background:transparent; border:1px solid #ddd0b3; border-radius:5px; cursor:pointer;\" style-hover=\"background:#e3d8bf;\">I<\u002Fbutton>\n          <button onmousedown=\"{{ prevent }}\" onclick=\"{{ expandFmtUnderline }}\" title=\"Underline\" style=\"width:30px; height:30px; font-family:'Spectral',serif; text-decoration:underline; font-size:15px; color:#5a5142; background:transparent; border:1px solid #ddd0b3; border-radius:5px; cursor:pointer;\" style-hover=\"background:#e3d8bf;\">U<\u002Fbutton>\n          <div style=\"width:1px; height:22px; background:#ddd0b3; margin:4px 4px 0;\"><\u002Fdiv>\n          <button onmousedown=\"{{ prevent }}\" onclick=\"{{ expandFmtList }}\" title=\"Bullet list\" style=\"height:30px; padding:0 10px; font-size:13px; color:#5a5142; background:transparent; border:1px solid #ddd0b3; border-radius:5px; cursor:pointer;\" style-hover=\"background:#e3d8bf;\">• List<\u002Fbutton>\n          <button onmousedown=\"{{ prevent }}\" onclick=\"{{ expandFmtQuote }}\" title=\"Block quote\" style=\"height:30px; padding:0 10px; font-size:13px; color:#5a5142; background:transparent; border:1px solid #ddd0b3; border-radius:5px; cursor:pointer;\" style-hover=\"background:#e3d8bf;\">❝ Quote<\u002Fbutton>\n          <button onmousedown=\"{{ prevent }}\" onclick=\"{{ expandFmtClear }}\" title=\"Clear formatting\" style=\"height:30px; padding:0 10px; font-size:12px; color:#8a7f6d; background:transparent; border:1px solid #ddd0b3; border-radius:5px; cursor:pointer; margin-left:auto;\" style-hover=\"background:#e3d8bf;\">Clear<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"scroll\" style=\"flex:1; overflow-y:auto; padding:24px 28px;\">\n          <div class=\"comment-edit\" ref=\"{{ setExpandEl }}\" contenteditable=\"true\" oninput=\"{{ onExpandInput }}\" data-placeholder=\"Write your full note here…\" style=\"min-height:280px; font-family:'Spectral','Noto Serif Thai',Georgia,serif; font-size:17px; line-height:1.85; color:#2b2620; outline:none; word-break:break-word;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <input ref=\"{{ setFileInput }}\" type=\"file\" accept=\"application/json,.json\" onchange=\"{{ onImportFile }}\" style=\"display:none;\">\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;tagPreset&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;default&quot;: &quot;Academic&quot;,\n    &quot;options&quot;: [&quot;Academic&quot;, &quot;Qualitative Research&quot;, &quot;Literary Criticism&quot;, &quot;Language Study&quot;],\n    &quot;tsType&quot;: &quot;string&quot;\n  },\n  &quot;customTagNames&quot;: {\n    &quot;editor&quot;: &quot;text&quot;,\n    &quot;default&quot;: &quot;&quot;,\n    &quot;tsType&quot;: &quot;string&quot;\n  }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const PALETTE = ['#C9971E','#C25B5B','#B07C2E','#5A966E','#4E7CA8','#8E6BA8','#CC7A3B','#3E8E8E','#A0506B','#6B8E3E','#9A6B45','#566CA8'];\n    this.PALETTE = PALETTE;\n    const loaded = this.load();\n    this.state = {\n      docs: loaded.docs,\n      tags: loaded.tags,\n      activeDocId: loaded.activeDocId,\n      mode: 'read',\n      activeAnnId: null,\n      filterTags: [],\n      menuOpen: false,\n      tagMgrInput: '',\n      tagMgrOpen: false,\n      expandedAnnId: null,\n      tb: { show:false, x:0, y:0 }\n    };\n    this.commentEls = {};\n    this.cardRefs = {};\n    this.savedRange = null;\n    this._saveTimer = null;\n  }\n\n  /* ---------- persistence ---------- */\n  load(){\n    const DEFAULT_TAGS = [\n      {id:'t1',name:'Theme',color:'#C9971E'},\n      {id:'t2',name:'Question',color:'#C25B5B'},\n      {id:'t3',name:'Key quote',color:'#B07C2E'},\n      {id:'t4',name:'Evidence',color:'#5A966E'},\n      {id:'t5',name:'Definition',color:'#4E7CA8'},\n      {id:'t6',name:'Connection',color:'#8E6BA8'},\n      {id:'t7',name:'Doubt',color:'#CC7A3B'},\n      {id:'t8',name:'Method',color:'#3E8E8E'}\n    ];\n    try {\n      const raw = localStorage.getItem('marginalia.v1');\n      if(raw){\n        const d = JSON.parse(raw);\n        if(d && d.docs && d.docs.length) return { docs:d.docs, tags:d.tags||DEFAULT_TAGS, activeDocId:d.activeDocId||d.docs[0].id };\n      }\n    } catch(e){}\n    // seed\n    const seedHtml = '<h1>On the Habits of Readers<\u002Fh1>'\n      + '<p>Reading is never a passive act. The page invites us to '\n      + '<mark data-ann-id=\"seed1\" style=\"background:rgba(201,151,30,0.32);border-radius:2px;cursor:pointer;color:inherit;\">leave traces<\u002Fmark>'\n      + ' — a line drawn beneath a phrase, a question pressed into the margin, a colour laid over a sentence that refuses to be forgotten.<\u002Fp>'\n      + '<p>A book read without marks is a book half-read; the marginal hand is where private thought first becomes visible.<\u002Fp>'\n      + '<p>การอ่านไม่เคยเป็นเพียงการรับสาร หนังสือเชื้อเชิญให้เราทิ้งร่องรอยไว้ — เส้นใต้ถ้อยคำ คำถามที่จดไว้ริมขอบหน้า และสีที่ทาทับประโยคซึ่งเราไม่อยากลืม<\u002Fp>'\n      + '<p>หนังสือที่อ่านโดยไม่มีรอยจดคือหนังสือที่อ่านไปเพียงครึ่งเดียว ริมขอบหน้าคือที่ซึ่งความคิดส่วนตัวปรากฏเป็นรูปธรรมครั้งแรก<\u002Fp>';\n    const doc = { id:'doc1', title:'On the Habits of Readers', html:seedHtml,\n      annotations:[ {id:'seed1', tagId:'t1', comment:'The core metaphor — the whole practice named in two words.', quote:'leave traces', order:0} ] };\n    return { docs:[doc], tags:DEFAULT_TAGS, activeDocId:'doc1' };\n  }\n  save(){\n    try {\n      localStorage.setItem('marginalia.v1', JSON.stringify({\n        docs:this.state.docs, tags:this.state.tags, activeDocId:this.state.activeDocId\n      }));\n    } catch(e){}\n  }\n  saveSoon(){ clearTimeout(this._saveTimer); this._saveTimer = setTimeout(()=>this.save(), 350); }\n\n  /* ---------- helpers ---------- */\n  uid(p){ return (p||'a') + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }\n  hexRgba(hex,a){\n    const h = hex.replace('#','');\n    const n = parseInt(h.length===3 ? h.split('').map(c=>c+c).join('') : h, 16);\n    return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';\n  }\n  getActive(){ return this.state.docs.find(d=>d.id===this.state.activeDocId) || null; }\n  tagById(id){ return this.state.tags.find(t=>t.id===id) || {name:'—',color:'#9a9a9a'}; }\n\n  /* ---------- surface management ---------- */\n  setSurface = (el)=>{\n    if(el && el !== this.surfaceEl){\n      this.surfaceEl = el;\n      el.addEventListener('mouseup', this.onSurfaceMouseUp);\n      el.addEventListener('click', this.onSurfaceClick);\n      el.addEventListener('input', this.onSurfaceInput);\n      el.addEventListener('paste', this.onPaste);\n      this.repopulate();\n    }\n  };\n  setCenter = (el)=>{ this.centerEl = el; };\n  setPanel = (el)=>{ this.panelEl = el; };\n  setFileInput = (el)=>{ this.fileInput = el; };\n\n  repopulate(){\n    const el = this.surfaceEl; if(!el) return;\n    const doc = this.getActive();\n    el.innerHTML = doc ? doc.html : '';\n    el.setAttribute('contenteditable', this.state.mode==='edit' ? 'true' : 'false');\n    this.applyFilter();\n  }\n  readHtmlBack(){\n    const el = this.surfaceEl; if(!el) return;\n    const doc = this.getActive(); if(!doc) return;\n    doc.html = el.innerHTML;\n    // reconcile: drop annotations whose mark is gone; refresh order\n    const ids = [];\n    el.querySelectorAll('mark[data-ann-id]').forEach(m=>{ const id=m.getAttribute('data-ann-id'); if(!ids.includes(id)) ids.push(id); });\n    doc.annotations = doc.annotations.filter(a=>ids.includes(a.id));\n    doc.annotations.forEach(a=>{ a.order = ids.indexOf(a.id); });\n    this.saveSoon();\n  }\n  applyFilter(){\n    const el = this.surfaceEl; if(!el) return;\n    const doc = this.getActive(); if(!doc) return;\n    const filt = this.state.filterTags;\n    el.querySelectorAll('mark[data-ann-id]').forEach(m=>{\n      const id = m.getAttribute('data-ann-id');\n      const ann = doc.annotations.find(a=>a.id===id);\n      const dim = filt.length && (!ann || !filt.includes(ann.tagId));\n      m.style.opacity = dim ? '0.28' : '1';\n      m.style.outline = (id===this.state.activeAnnId) ? ('2px solid '+(ann?this.hexRgba(this.tagById(ann.tagId).color,0.7):'#999')) : 'none';\n      m.style.outlineOffset = '1px';\n    });\n  }\n\n  /* ---------- selection → highlight ---------- */\n  onSurfaceMouseUp = ()=>{\n    if(this.state.mode==='edit') return;\n    setTimeout(()=>{\n      const sel = window.getSelection();\n      if(!sel || sel.rangeCount===0 || sel.isCollapsed){ return; }\n      const range = sel.getRangeAt(0);\n      if(!this.surfaceEl.contains(range.commonAncestorContainer)) return;\n      if(range.toString().trim().length===0) return;\n      this.savedRange = range.cloneRange();\n      const r = range.getBoundingClientRect();\n      const x = r.left + r.width/2;\n      const y = r.top - 6;\n      this.setState({ tb:{ show:true, x, y } });\n    }, 1);\n  };\n  onSurfaceClick = (e)=>{\n    const mark = e.target.closest && e.target.closest('mark[data-ann-id]');\n    if(mark && this.state.mode==='read'){\n      const id = mark.getAttribute('data-ann-id');\n      this.selectAnn(id, true);\n    }\n  };\n  onSurfaceInput = ()=>{ if(this.state.mode==='edit') this.readHtmlBack(); };\n  onPaste = (e)=>{\n    if(this.state.mode!=='edit') return;\n    // sanitize pasted html: keep structure, strip styles/colours/foreign attrs\n    const html = e.clipboardData && e.clipboardData.getData('text/html');\n    if(!html) return; // let plain text paste through natively\n    e.preventDefault();\n    const clean = this.sanitize(html);\n    document.execCommand('insertHTML', false, clean);\n  };\n  sanitize(html){\n    const ALLOWED = {B:1,STRONG:1,I:1,EM:1,U:1,H1:1,H2:1,H3:1,P:1,BR:1,UL:1,OL:1,LI:1,BLOCKQUOTE:1,MARK:1};\n    const tmp = document.createElement('div'); tmp.innerHTML = html;\n    const walk = (node)=>{\n      [...node.childNodes].forEach(c=>{\n        if(c.nodeType===1){\n          if(!ALLOWED[c.tagName]){\n            // unwrap\n            while(c.firstChild) node.insertBefore(c.firstChild, c);\n            node.removeChild(c);\n          } else {\n            [...c.attributes].forEach(at=>{ if(!(c.tagName==='MARK' && (at.name==='data-ann-id'||at.name==='style'))) c.removeAttribute(at.name); });\n            walk(c);\n          }\n        }\n      });\n    };\n    walk(tmp);\n    return tmp.innerHTML;\n  }\n  prevent = (e)=>{ e.preventDefault(); };\n  stop = (e)=>{ e.stopPropagation(); };\n\n  applyTagToSelection = (tagId)=>{\n    const range = this.savedRange;\n    if(!range){ this.setState({ tb:{show:false,x:0,y:0} }); return; }\n    const tag = this.tagById(tagId);\n    const annId = this.uid('a');\n    const quote = range.toString().trim().replace(/\\s+/g,' ').slice(0,300);\n    this.wrapRange(range, annId, tag.color);\n    const doc = this.getActive();\n    doc.annotations.push({ id:annId, tagId, comment:'', quote, order: doc.annotations.length });\n    this.readHtmlBack();\n    this.savedRange = null;\n    window.getSelection().removeAllRanges();\n    this.setState({ tb:{show:false,x:0,y:0}, activeAnnId:annId }, ()=>{\n      this.applyFilter();\n      this.scrollPanelTo(annId);\n    });\n  };\n  wrapRange(range, annId, color){\n    const surface = this.surfaceEl;\n    const nodes = [];\n    const walker = document.createTreeWalker(surface, NodeFilter.SHOW_TEXT, null);\n    let n;\n    while((n = walker.nextNode())){ if(range.intersectsNode(n)) nodes.push(n); }\n    const bg = this.hexRgba(color, 0.32);\n    nodes.forEach(node=>{\n      let from = 0, to = node.length;\n      if(node===range.startContainer) from = range.startOffset;\n      if(node===range.endContainer) to = range.endOffset;\n      if(from >= to) return;\n      let target = node;\n      if(from > 0) target = node.splitText(from);\n      if((to - from) < target.length) target.splitText(to - from);\n      const mark = document.createElement('mark');\n      mark.setAttribute('data-ann-id', annId);\n      mark.style.background = bg;\n      mark.style.borderRadius = '2px';\n      mark.style.cursor = 'pointer';\n      mark.style.color = 'inherit';\n      target.parentNode.insertBefore(mark, target);\n      mark.appendChild(target);\n    });\n  }\n  removeAnn = (annId)=>{\n    const surface = this.surfaceEl;\n    if(surface){\n      surface.querySelectorAll('mark[data-ann-id=\"'+annId+'\"]').forEach(m=>{\n        const p = m.parentNode;\n        while(m.firstChild) p.insertBefore(m.firstChild, m);\n        p.removeChild(m);\n        p.normalize();\n      });\n    }\n    const doc = this.getActive();\n    doc.annotations = doc.annotations.filter(a=>a.id!==annId);\n    this.readHtmlBack();\n    this.setState({ activeAnnId: this.state.activeAnnId===annId ? null : this.state.activeAnnId }, ()=>this.applyFilter());\n  };\n  recolorAnn(annId, color){\n    const surface = this.surfaceEl;\n    if(!surface) return;\n    surface.querySelectorAll('mark[data-ann-id=\"'+annId+'\"]').forEach(m=>{ m.style.background = this.hexRgba(color,0.32); });\n  }\n\n  /* ---------- annotation editing ---------- */\n  updateComment = (annId, val)=>{\n    const doc = this.getActive();\n    const a = doc.annotations.find(x=>x.id===annId);\n    if(a){ a.comment = val; this.saveSoon(); }\n  };\n  setAnnTag = (annId, tagId)=>{\n    const doc = this.getActive();\n    const a = doc.annotations.find(x=>x.id===annId);\n    if(a){ a.tagId = tagId; this.recolorAnn(annId, this.tagById(tagId).color); this.readHtmlBack(); this.setState({}, ()=>this.applyFilter()); }\n  };\n  selectAnn(annId, scrollPanel){\n    this.setState({ activeAnnId: annId }, ()=>{\n      this.applyFilter();\n      if(scrollPanel) this.scrollPanelTo(annId);\n    });\n  }\n  scrollPanelTo(annId){\n    const card = this.cardRefs[annId]; const panel = this.panelEl;\n    if(card && panel){ panel.scrollTop += card.getBoundingClientRect().top - panel.getBoundingClientRect().top - 70; }\n  }\n\n  /* ---------- expanded note editor ---------- */\n  setCommentEl = (annId) => (el) => {\n    if(el && el !== this.commentEls[annId]){\n      this.commentEls[annId] = el;\n      const doc = this.getActive();\n      const ann = doc && doc.annotations.find(a=>a.id===annId);\n      el.innerHTML = (ann && ann.comment) || '';\n    }\n  };\n  setExpandEl = (el) => {\n    this.expandEl = el;\n    if(el){\n      const doc = this.getActive();\n      const ann = doc && doc.annotations.find(a=>a.id===this.state.expandedAnnId);\n      el.innerHTML = (ann && ann.comment) || '';\n      setTimeout(()=>{ try{ if(el.isConnected){ el.focus(); const r=document.createRange(); r.selectNodeContents(el); r.collapse(false); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); }}catch(e){} }, 80);\n    }\n  };\n  onExpandInput = (e) => {\n    const annId = this.state.expandedAnnId; if(!annId) return;\n    const html = e.currentTarget.innerHTML;\n    this.updateComment(annId, html);\n    const inlineEl = this.commentEls[annId];\n    if(inlineEl) inlineEl.innerHTML = html;\n  };\n  openExpand = (annId) => { this.setState({ expandedAnnId: annId }); };\n  closeExpand = () => { this.setState({ expandedAnnId: null }); };\n  expandFmtBold = () => { document.execCommand('bold'); };\n  expandFmtItalic = () => { document.execCommand('italic'); };\n  expandFmtUnderline = () => { document.execCommand('underline'); };\n  expandFmtList = () => { document.execCommand('insertUnorderedList'); };\n  expandFmtQuote = () => { document.execCommand('formatBlock', false, 'blockquote'); };\n  expandFmtClear = () => { document.execCommand('removeFormat'); };\n  jumpToMark = (annId)=>{\n    const surface = this.surfaceEl, center = this.centerEl;\n    const m = surface && surface.querySelector('mark[data-ann-id=\"'+annId+'\"]');\n    this.selectAnn(annId, false);\n    if(m && center){\n      center.scrollTop += m.getBoundingClientRect().top - center.getBoundingClientRect().top - center.clientHeight/2;\n      m.style.animation = 'none';\n      void m.offsetWidth;\n      m.style.animation = 'flashmark 1.1s ease';\n    }\n  };\n\n  /* ---------- formatting (edit mode) ---------- */\n  fmtBold = ()=>{ document.execCommand('bold'); this.readHtmlBack(); };\n  fmtItalic = ()=>{ document.execCommand('italic'); this.readHtmlBack(); };\n  fmtH1 = ()=>{ document.execCommand('formatBlock', false, 'h1'); this.readHtmlBack(); };\n  fmtH2 = ()=>{ document.execCommand('formatBlock', false, 'h2'); this.readHtmlBack(); };\n  fmtQuote = ()=>{ document.execCommand('formatBlock', false, 'blockquote'); this.readHtmlBack(); };\n  fmtList = ()=>{ document.execCommand('insertUnorderedList'); this.readHtmlBack(); };\n  pastePlain = async ()=>{\n    try { const t = await navigator.clipboard.readText(); if(t) document.execCommand('insertText', false, t); this.readHtmlBack(); }\n    catch(e){ alert('Allow clipboard access, or paste with Cmd/Ctrl+V (formatting will be cleaned automatically).'); }\n  };\n\n  /* ---------- documents ---------- */\n  newDoc = ()=>{\n    const id = this.uid('doc');\n    const doc = { id, title:'Untitled', html:'<p><br><\u002Fp>', annotations:[] };\n    this.setState({ docs:[...this.state.docs, doc], activeDocId:id, mode:'edit', activeAnnId:null }, ()=>{\n      this.save(); this.repopulate(); if(this.surfaceEl) this.surfaceEl.focus();\n    });\n  };\n  selectDoc = (id)=>{\n    if(id===this.state.activeDocId) return;\n    this.setState({ activeDocId:id, activeAnnId:null, mode:'read' }, ()=>{ this.save(); this.repopulate(); });\n  };\n  deleteDoc = (id)=>{\n    if(!confirm('Delete this document and all its notes?')) return;\n    let docs = this.state.docs.filter(d=>d.id!==id);\n    if(docs.length===0) docs = [{ id:this.uid('doc'), title:'Untitled', html:'<p><br><\u002Fp>', annotations:[] }];\n    const activeDocId = (id===this.state.activeDocId) ? docs[0].id : this.state.activeDocId;\n    this.setState({ docs, activeDocId, activeAnnId:null }, ()=>{ this.save(); this.repopulate(); });\n  };\n  setTitle = (val)=>{ const doc=this.getActive(); if(doc){ doc.title=val; this.saveSoon(); this.forceUpdate(); } };\n  setMode = (mode)=>{\n    if(mode===this.state.mode) return;\n    if(this.state.mode==='edit') this.readHtmlBack();\n    this.setState({ mode, tb:{show:false,x:0,y:0} }, ()=>this.repopulate());\n  };\n\n  /* ---------- filters ---------- */\n  toggleFilter = (tagId)=>{\n    const has = this.state.filterTags.includes(tagId);\n    const filterTags = has ? this.state.filterTags.filter(t=>t!==tagId) : [...this.state.filterTags, tagId];\n    this.setState({ filterTags }, ()=>this.applyFilter());\n  };\n  clearFilters = ()=>{ this.setState({ filterTags:[] }, ()=>this.applyFilter()); };\n\n  /* ---------- tag manager ---------- */\n  toggleTagMgr = ()=>{\n    const open = !this.state.tagMgrOpen;\n    this.setState({ tagMgrOpen:open, menuOpen:false,\n      tagMgrInput: open ? (this.props.customTagNames||'') : this.state.tagMgrInput });\n  };\n  closeTagMgr = ()=>{ this.setState({ tagMgrOpen:false }); };\n  renameTag = (id, name)=>{ const t=this.state.tags.find(x=>x.id===id); if(t){ t.name=name; this.saveSoon(); this.forceUpdate(); } };\n  recolorTag = (id, color)=>{\n    const t = this.state.tags.find(x=>x.id===id); if(!t) return;\n    t.color = color;\n    // recolor all marks using this tag across docs (current doc live)\n    const doc = this.getActive();\n    if(doc) doc.annotations.filter(a=>a.tagId===id).forEach(a=>this.recolorAnn(a.id, color));\n    if(doc) this.readHtmlBack();\n    this.setState({}, ()=>this.applyFilter());\n  };\n  deleteTag = (id)=>{\n    if(this.state.tags.length<=1) return;\n    if(!confirm('Delete this tag? Notes using it will keep their colour but lose the label.')) return;\n    this.setState({ tags:this.state.tags.filter(t=>t.id!==id), filterTags:this.state.filterTags.filter(t=>t!==id) }, ()=>this.save());\n  };\n  addTag = ()=>{\n    const used = this.state.tags.map(t=>t.color);\n    const color = this.PALETTE.find(c=>!used.includes(c)) || this.PALETTE[this.state.tags.length % this.PALETTE.length];\n    this.setState({ tags:[...this.state.tags, { id:this.uid('t'), name:'New tag', color }] }, ()=>this.save());\n  };\n  clearAllTags = ()=>{\n    if(!confirm('Clear all tags?\\n\\nExisting highlights stay in the text but lose their labels.')) return;\n    this.setState({ tags:[], filterTags:[] }, ()=>this.save());\n  };\n\n  get PRESETS(){\n    return {\n      'Academic': [\n        {name:'Theme',color:'#C9971E'},{name:'Question',color:'#C25B5B'},\n        {name:'Key quote',color:'#B07C2E'},{name:'Evidence',color:'#5A966E'},\n        {name:'Definition',color:'#4E7CA8'},{name:'Connection',color:'#8E6BA8'},\n        {name:'Doubt',color:'#CC7A3B'},{name:'Method',color:'#3E8E8E'}\n      ],\n      'Qualitative Research': [\n        {name:'Code',color:'#C9971E'},{name:'Memo',color:'#4E7CA8'},\n        {name:'Emerging theme',color:'#5A966E'},{name:'Counter-example',color:'#C25B5B'},\n        {name:'In vivo',color:'#B07C2E'},{name:'Analytic note',color:'#8E6BA8'},\n        {name:'Follow up',color:'#CC7A3B'},{name:'Saturation',color:'#3E8E8E'}\n      ],\n      'Literary Criticism': [\n        {name:'Motif',color:'#C9971E'},{name:'Symbol',color:'#8E6BA8'},\n        {name:'Tone shift',color:'#CC7A3B'},{name:'Character',color:'#4E7CA8'},\n        {name:'Imagery',color:'#5A966E'},{name:'Intertextual',color:'#B07C2E'},\n        {name:'Structure',color:'#3E8E8E'},{name:'Irony',color:'#C25B5B'}\n      ],\n      'Language Study': [\n        {name:'Vocabulary',color:'#C9971E'},{name:'Grammar',color:'#4E7CA8'},\n        {name:'Register',color:'#8E6BA8'},{name:'Idiom',color:'#B07C2E'},\n        {name:'Collocate',color:'#5A966E'},{name:'TH\\u2013EN parallel',color:'#CC7A3B'},\n        {name:'Translation',color:'#3E8E8E'},{name:'Usage',color:'#C25B5B'}\n      ]\n    };\n  }\n\n  loadPreset = (name)=>{\n    const preset = this.PRESETS[name];\n    if(!preset) return;\n    if(!confirm('Load \"'+name+'\" preset?\\n\\nYour current tag names and colours will be replaced. Existing highlights stay in the text.')) return;\n    const tags = preset.map(t=>({ id:this.uid('t'), name:t.name, color:t.color }));\n    this.setState({ tags, filterTags:[] }, ()=>this.save());\n  };\n\n  applyQuickAdd = ()=>{\n    const raw = (this.state.tagMgrInput||'').trim();\n    if(!raw) return;\n    const names = raw.split(',').map(s=>s.trim()).filter(Boolean);\n    const existing = this.state.tags.map(t=>t.name.toLowerCase());\n    const toAdd = names.filter(n=>!existing.includes(n.toLowerCase()));\n    if(!toAdd.length){ alert('All those tags already exist.'); return; }\n    const usedColors = this.state.tags.map(t=>t.color);\n    const newTags = toAdd.map(name=>{\n      const color = this.PALETTE.find(c=>!usedColors.includes(c)) || this.PALETTE[usedColors.length % this.PALETTE.length];\n      usedColors.push(color);\n      return { id:this.uid('t'), name, color };\n    });\n    this.setState({ tags:[...this.state.tags, ...newTags], tagMgrInput:'' }, ()=>this.save());\n  };\n\n  /* ---------- export / import ---------- */\n  toggleExport = ()=>{ this.setState({ menuOpen:!this.state.menuOpen }); };\n  download(name, text, type){\n    const blob = new Blob([text], {type:type||'text/plain'});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a'); a.href=url; a.download=name; a.click();\n    setTimeout(()=>URL.revokeObjectURL(url), 1000);\n  }\n  notesMarkdown(){\n    const doc = this.getActive(); if(!doc) return '';\n    const anns = doc.annotations.slice().sort((a,b)=>(a.order||0)-(b.order||0));\n    let out = '# '+doc.title+'\\n\\n';\n    anns.forEach((a,i)=>{\n      const tag = this.tagById(a.tagId);\n      out += (i+1)+'. **['+tag.name+']** “'+a.quote+'”\\n';\n      if(a.comment) out += '   — '+a.comment+'\\n';\n      out += '\\n';\n    });\n    return out;\n  }\n  exportMd = ()=>{ const doc=this.getActive(); this.download((doc?doc.title:'notes')+'.md', this.notesMarkdown(), 'text/markdown'); this.setState({menuOpen:false}); };\n  copyNotes = async ()=>{ try{ await navigator.clipboard.writeText(this.notesMarkdown()); }catch(e){} this.setState({menuOpen:false}); };\n  exportJson = ()=>{ this.download('marginalia-backup.json', JSON.stringify({docs:this.state.docs, tags:this.state.tags, activeDocId:this.state.activeDocId}, null, 2), 'application/json'); this.setState({menuOpen:false}); };\n  triggerImport = ()=>{ this.setState({menuOpen:false}); if(this.fileInput) this.fileInput.click(); };\n  onImportFile = (e)=>{\n    const file = e.target.files && e.target.files[0]; if(!file) return;\n    const reader = new FileReader();\n    reader.onload = ()=>{\n      try {\n        const d = JSON.parse(reader.result);\n        if(!d.docs || !d.docs.length){ alert('That file has no documents.'); return; }\n        if(!confirm('Restore this backup? It will replace your current documents and tags.')) return;\n        this.setState({ docs:d.docs, tags:d.tags||this.state.tags, activeDocId:d.activeDocId||d.docs[0].id, activeAnnId:null, mode:'read' }, ()=>{ this.save(); this.repopulate(); });\n      } catch(err){ alert('Could not read that file.'); }\n    };\n    reader.readAsText(file);\n    e.target.value = '';\n  };\n\n  componentDidUpdate(){\n    if(this._lastActiveAnnId !== this.state.activeAnnId){\n      this._lastActiveAnnId = this.state.activeAnnId;\n      this.applyFilter();\n    }\n  }\n\n  /* ---------- render values ---------- */\n  renderVals(){\n    const doc = this.getActive();\n    const isEdit = this.state.mode==='edit';\n    const tags = this.state.tags;\n    const anns = doc ? doc.annotations.slice().sort((a,b)=>(a.order||0)-(b.order||0)) : [];\n\n    // counts per tag in active doc\n    const counts = {};\n    anns.forEach(a=>{ counts[a.tagId] = (counts[a.tagId]||0)+1; });\n\n    const segOn = 'font-size:12.5px; padding:5px 13px; border:none; border-radius:4px; cursor:pointer; background:#2b2620; color:#f1ead9; font-family:inherit;';\n    const segOff = 'font-size:12.5px; padding:5px 13px; border:none; border-radius:4px; cursor:pointer; background:transparent; color:#6b6151; font-family:inherit;';\n\n    const docList = this.state.docs.map(d=>({\n      title: d.title || 'Untitled',\n      count: d.annotations.length===1 ? '1 note' : d.annotations.length+' notes',\n      style: 'padding:9px 10px; border-radius:7px; cursor:pointer; margin-bottom:2px; background:'+(d.id===this.state.activeDocId?'#f7f1e2':'transparent')+'; '+(d.id===this.state.activeDocId?'box-shadow:inset 0 0 0 1px #e0d4b8;':''),\n      onSelect: ()=>this.selectDoc(d.id),\n      onDelete: (e)=>{ e.stopPropagation(); this.deleteDoc(d.id); }\n    }));\n\n    const filterPills = tags.map(t=>{\n      const active = this.state.filterTags.includes(t.id);\n      return {\n        name: t.name,\n        count: counts[t.id] ? ' '+counts[t.id] : '',\n        style: 'display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-family:inherit; cursor:pointer; padding:4px 10px; border-radius:20px; border:1px solid '+(active?this.hexRgba(t.color,0.9):'#e0d4b8')+'; background:'+(active?this.hexRgba(t.color,0.16):'transparent')+'; color:'+(active?'#3a342b':'#8a7f6d')+';',\n        dotStyle: 'width:8px; height:8px; border-radius:50%; flex:none; background:'+t.color+';',\n        onToggle: ()=>this.toggleFilter(t.id)\n      };\n    });\n\n    const expandedAnn = this.state.expandedAnnId ? (doc && doc.annotations.find(a=>a.id===this.state.expandedAnnId)||null) : null;\n    const expandedTag = expandedAnn ? this.tagById(expandedAnn.tagId) : {name:'',color:'#9a9a9a'};\n\n    const notes = anns.map((a,i)=>{\n      const tag = this.tagById(a.tagId);\n      const active = a.id===this.state.activeAnnId;\n      return {\n        id: a.id,\n        numLabel: String(i+1).padStart(2,'0'),\n        quote: a.quote,\n        comment: a.comment,\n        tagName: tag.name,\n        tagColorStyle: 'color:'+tag.color+';',\n        dotStyle: 'width:9px; height:9px; border-radius:50%; flex:none; background:'+tag.color+';',\n        cardStyle: 'background:#fffdf8; border:1px solid #ece1cc; border-left:4px solid '+tag.color+'; border-radius:8px; padding:12px 13px; cursor:pointer; box-shadow:'+(active?'0 2px 10px '+this.hexRgba(tag.color,0.28):'0 1px 2px rgba(60,50,30,.05)')+'; '+(active?'background:#fffaf0;':''),\n        setRef: (el)=>{ this.cardRefs[a.id]=el; },\n        onJump: ()=>this.jumpToMark(a.id),\n        onDelete: (e)=>{ e.stopPropagation(); this.removeAnn(a.id); },\n        onComment: (e)=>{ const html=e.currentTarget.innerHTML; if(this.state.expandedAnnId===a.id&&this.expandEl) this.expandEl.innerHTML=html; this.updateComment(a.id,html); },\n        setCommentEl: this.setCommentEl(a.id),\n        fmtBold: ()=>document.execCommand('bold'),\n        fmtItalic: ()=>document.execCommand('italic'),\n        fmtList: ()=>document.execCommand('insertUnorderedList'),\n        onExpand: (ev)=>{ ev.stopPropagation(); this.openExpand(a.id); },\n        tagOptions: tags.map(t=>({\n          name: t.name,\n          style: 'width:15px; height:15px; border-radius:50%; cursor:pointer; padding:0; background:'+t.color+'; border:2px solid '+(t.id===a.tagId?'#3a342b':'transparent')+'; box-shadow:0 0 0 1px rgba(0,0,0,.06);',\n          onPick: (e)=>{ e.stopPropagation(); this.setAnnTag(a.id, t.id); }\n        }))\n      };\n    });\n\n    const toolbarTags = tags.map(t=>({\n      name: t.name,\n      style: 'width:22px; height:22px; border-radius:50%; cursor:pointer; padding:0; background:'+t.color+'; border:2px solid transparent;',\n      onApply: ()=>this.applyTagToSelection(t.id)\n    }));\n\n    const tagRows = tags.map(t=>({\n      name: t.name,\n      onName: (e)=>this.renameTag(t.id, e.target.value),\n      onDelete: ()=>this.deleteTag(t.id),\n      swatches: this.PALETTE.slice(0,6).map(c=>({\n        style: 'width:16px; height:16px; border-radius:50%; cursor:pointer; padding:0; background:'+c+'; border:2px solid '+(c.toLowerCase()===t.color.toLowerCase()?'#2b2620':'transparent')+';',\n        onPick: ()=>this.recolorTag(t.id, c)\n      }))\n    }));\n\n    const tb = this.state.tb;\n    const tbStyle = 'position:fixed; z-index:50; transform:translate(-50%,-100%); transition:opacity .1s; '\n      + 'left:'+tb.x+'px; top:'+tb.y+'px; display:'+(tb.show?'block':'none')+';';\n\n    return {\n      activeTitle: doc ? (doc.title||'') : '',\n      onTitle: (e)=>this.setTitle(e.target.value),\n      isEdit,\n      setRead: ()=>this.setMode('read'),\n      setEdit: ()=>this.setMode('edit'),\n      readBtnStyle: isEdit ? segOff : segOn,\n      editBtnStyle: isEdit ? segOn : segOff,\n      setSurface: this.setSurface,\n      setCenter: this.setCenter,\n      setPanel: this.setPanel,\n      setFileInput: this.setFileInput,\n      docList,\n      newDoc: this.newDoc,\n      filterPills,\n      anyFilter: this.state.filterTags.length>0,\n      clearFilters: this.clearFilters,\n      notes,\n      noNotes: anns.length===0,\n      notesCountLabel: anns.length===0 ? '' : (anns.length===1 ? '1 mark' : anns.length+' marks'),\n      tbStyle,\n      toolbarTags,\n      cancelTb: ()=>{ this.savedRange=null; this.setState({tb:{show:false,x:0,y:0}}); },\n      prevent: this.prevent,\n      stop: this.stop,\n      fmtBold:this.fmtBold, fmtItalic:this.fmtItalic, fmtH1:this.fmtH1, fmtH2:this.fmtH2, fmtQuote:this.fmtQuote, fmtList:this.fmtList, pastePlain:this.pastePlain,\n      menuOpen: this.state.menuOpen,\n      toggleExport: this.toggleExport,\n      exportMd:this.exportMd, copyNotes:this.copyNotes, exportJson:this.exportJson, triggerImport:this.triggerImport,\n      onImportFile: this.onImportFile,\n      toggleTagMgr: this.toggleTagMgr,\n      tagMgrOpen: this.state.tagMgrOpen,\n      closeTagMgr: this.closeTagMgr,\n      tagRows,\n      addTag: this.addTag,\n      presetBtns: Object.keys(this.PRESETS).map(name=>({\n        name,\n        style: 'font-size:12px; font-family:inherit; cursor:pointer; padding:5px 12px; border-radius:6px; border:1px solid #ddd0b3; background:#fffdf8; color:#5a5142;',\n        onLoad: ()=>this.loadPreset(name)\n      })),\n      tagMgrInput: this.state.tagMgrInput,\n      onTagMgrInput: (e)=>this.setState({tagMgrInput:e.target.value}),\n      applyQuickAdd: this.applyQuickAdd,\n      clearAllTags: this.clearAllTags,\n      hasExpandedAnn: !!this.state.expandedAnnId,\n      expandedQuote: expandedAnn ? '\\u201c'+expandedAnn.quote+'\\u201d' : '',\n      expandedTagName: expandedTag.name,\n      expandedDotStyle: 'width:9px; height:9px; border-radius:50%; display:inline-block; background:'+expandedTag.color+';',\n      expandedTagColorStyle: 'color:'+expandedTag.color+';',\n      setExpandEl: this.setExpandEl,\n      onExpandInput: this.onExpandInput,\n      closeExpand: this.closeExpand,\n      expandFmtBold: this.expandFmtBold,\n      expandFmtItalic: this.expandFmtItalic,\n      expandFmtUnderline: this.expandFmtUnderline,\n      expandFmtList: this.expandFmtList,\n      expandFmtQuote: this.expandFmtQuote,\n      expandFmtClear: this.expandFmtClear\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
