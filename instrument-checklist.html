    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f6ce8697-3397-4431-ad23-2bd3e8178c58\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"115c9563-2017-42e1-ba36-19765d5bb305\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{background:#f7f7f5;font-family:'Public Sans',sans-serif;color:#1a1d1b;-webkit-font-smoothing:antialiased}\n  :root{--accent:#1f5c3d;--accent-tint:#eaf1ec;--accent-dark:#163f2a}\n  input,select,button,textarea{font-family:inherit}\n  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,92,61,.12)}\n  ::placeholder{color:#aeb4af}\n  input[type=number]{-moz-appearance:textfield}\n  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}\n  #print-doc{display:none}\n  @media print{\n    #app-root{display:none !important}\n    #print-doc{display:block !important}\n    @page{margin:18mm}\n    body{background:#fff}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"app-root\">\n\n  <!-- ===== HEADER: brand + instrument tabs ===== -->\n  <header style=\"position:sticky;top:0;z-index:30;background:#ffffff;border-bottom:1px solid #e4e7e3\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:11px 24px\">\n      <div style=\"display:flex;align-items:center;gap:10px;min-width:0;flex:none\">\n        <div style=\"width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:none\">\n          <div style=\"width:12px;height:12px;border:2px solid #fff;border-radius:2px\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font:700 14px 'Public Sans',sans-serif;color:#1a1d1b;line-height:1.1\">Instrument Checklist<\u002Fdiv>\n          <div style=\"font:500 10.5px 'Public Sans',sans-serif;color:#8a908b\">Document requirements builder<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <button onclick=\"{{onPrint}}\" style=\"display:inline-flex;align-items:center;border:1px solid #d2d6d1;background:#fff;color:#1a1d1b;border-radius:8px;padding:8px 14px;font:600 13px 'Public Sans',sans-serif;cursor:pointer\" style-hover=\"background:#f3f4f2\">Print<\u002Fbutton>\n        <button onclick=\"{{onPdf}}\" style=\"display:inline-flex;align-items:center;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:8px 15px;font:600 13px 'Public Sans',sans-serif;cursor:pointer\" style-hover=\"background:var(--accent-dark)\">Download PDF<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Instrument tabs row -->\n    <div style=\"display:flex;align-items:center;gap:5px;padding:0 24px 10px;overflow-x:auto\">\n      <sc-for list=\"{{instTabs}}\" as=\"tab\" hint-placeholder-count=\"0\">\n        <div onclick=\"{{tab.onClick}}\" style=\"{{tab.wrapStyle}}\">\n          <span style=\"font:600 12.5px 'Public Sans',sans-serif;pointer-events:none\">{{tab.displayTitle}}<\u002Fspan>\n          <sc-if value=\"{{tab.canRemove}}\" hint-placeholder-val=\"{{true}}\">\n            <button onclick=\"{{tab.onRemoveStop}}\" style=\"border:none;background:none;color:inherit;opacity:.55;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;margin-left:2px\" style-hover=\"opacity:1\">×<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <button onclick=\"{{addInstrument}}\" style=\"flex:none;border:1px dashed #c0c8c2;background:#fff;color:#5a615c;border-radius:8px;padding:6px 12px;font:600 12px 'Public Sans',sans-serif;cursor:pointer;white-space:nowrap\" style-hover=\"background:#f3f4f2\">+ Add Instrument<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== MAIN LAYOUT ===== -->\n  <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;gap:24px;padding:24px 28px;max-width:1340px;margin:0 auto\">\n\n    <!-- ===== BUILDER ===== -->\n    <div style=\"flex:1 1 520px;min-width:0\">\n\n      <!-- Instrument title -->\n      <div style=\"background:#fff;border:1px solid #e4e7e3;border-radius:13px;padding:16px 18px 18px;margin-bottom:22px\">\n        <label style=\"display:block;font:600 10.5px 'Public Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#8a908b;margin-bottom:8px\">Instrument title<\u002Flabel>\n        <input value=\"{{activeTitle}}\" onchange=\"{{onTitle}}\" placeholder=\"e.g. Deed of Sale between A and B Holdings (Pty) Ltd\" style=\"width:100%;box-sizing:border-box;padding:11px 13px;border:1px solid #d2d6d1;border-radius:9px;font:600 17px 'Source Serif 4',Georgia,serif;color:#1a1d1b;background:#fff\">\n      <\u002Fdiv>\n\n      <!-- PARTIES -->\n      <section style=\"margin-bottom:24px\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:11px\">\n          <h2 style=\"margin:0;font:700 12px 'Public Sans',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#5a615c\">Parties<\u002Fh2>\n          <span style=\"font:600 11px 'Public Sans',sans-serif;color:#fff;background:var(--accent);border-radius:99px;padding:2px 8px\">{{partyCount}}<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{parties}}\" as=\"party\" hint-placeholder-count=\"0\">\n          <div style=\"background:#fff;border:1px solid #e4e7e3;border-radius:13px;padding:14px;margin-bottom:12px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:11px\">\n              <span style=\"font:700 10px 'Public Sans',sans-serif;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-dark);background:var(--accent-tint);padding:4px 10px;border-radius:6px\">{{party.typeLabel}}<\u002Fspan>\n              <button onclick=\"{{party.onRemove}}\" style=\"border:none;background:none;color:#a4aaa5;font:600 12px 'Public Sans',sans-serif;cursor:pointer\" style-hover=\"color:#c0392b\">Remove<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- Natural person -->\n            <sc-if value=\"{{party.isNatural}}\" hint-placeholder-val=\"{{true}}\">\n              <input value=\"{{party.name}}\" onchange=\"{{party.onName}}\" placeholder=\"Full legal name\" style=\"width:100%;box-sizing:border-box;padding:9px 11px;border:1px solid #d2d6d1;border-radius:8px;font:500 14px 'Public Sans',sans-serif;color:#1a1d1b;background:#fff\">\n              <!-- Docs required box -->\n              <div style=\"margin-top:12px;background:#f5f9f7;border:1px solid #d0e8da;border-radius:9px;padding:11px 13px\">\n                <div style=\"font:700 9.5px 'Public Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#4a8a6a;margin-bottom:8px\">Documents required<\u002Fdiv>\n                <sc-for list=\"{{party.partyDocs}}\" as=\"pdoc\" hint-placeholder-count=\"0\">\n                  <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:4px 0\">\n                    <div style=\"display:flex;gap:8px;align-items:flex-start;flex:1;min-width:0\">\n                      <span style=\"flex:none;width:6px;height:6px;border-radius:99px;background:var(--accent);margin-top:5px\"><\u002Fspan>\n                      <span style=\"font:400 12.5px 'Public Sans',sans-serif;color:#1a1d1b;line-height:1.45\">{{pdoc.label}}<\u002Fspan>\n                    <\u002Fdiv>\n                    <input type=\"number\" min=\"1\" max=\"99\" value=\"{{pdoc.qty}}\" onchange=\"{{pdoc.onQty}}\" style=\"width:48px;border:1px solid #c0d9ca;border-radius:6px;padding:4px 0;font:700 13px 'Public Sans',sans-serif;color:var(--accent-dark);text-align:center;background:#fff;flex:none\">\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <!-- Same person -->\n              <sc-if value=\"{{party.hasLinks}}\" hint-placeholder-val=\"{{true}}\">\n                <div style=\"margin-top:12px\">\n                  <label style=\"display:block;font:600 10.5px 'Public Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#8a908b;margin-bottom:6px\">Same physical person as<\u002Flabel>\n                  <select value=\"{{party.sameAsId}}\" onchange=\"{{party.onLink}}\" style=\"width:100%;box-sizing:border-box;padding:9px 11px;border:1px solid #d2d6d1;border-radius:8px;font:400 13.5px 'Public Sans',sans-serif;color:#1a1d1b;background:#fff;cursor:pointer\">\n                    <option value=\"\">— Not linked —<\u002Foption>\n                    <sc-for list=\"{{party.linkOptions}}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{opt.id}}\">{{opt.label}}<\u002Foption><\u002Fsc-for>\n                  <\u002Fselect>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <!-- Additional docs -->\n              <div style=\"margin-top:12px;border-top:1px dashed #e4e7e3;padding-top:12px\">\n                <div style=\"font:600 10.5px 'Public Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#8a908b;margin-bottom:7px\">Additional documents<\u002Fdiv>\n                <sc-for list=\"{{party.extraDocs}}\" as=\"doc\" hint-placeholder-count=\"0\">\n                  <div style=\"display:flex;gap:7px;margin-bottom:7px\">\n                    <input value=\"{{doc.label}}\" onchange=\"{{doc.onLabel}}\" placeholder=\"e.g. Lawyer license, Marriage certificate\" style=\"flex:1;min-width:0;box-sizing:border-box;padding:8px 10px;border:1px solid #d2d6d1;border-radius:8px;font:400 13.5px 'Public Sans',sans-serif;color:#1a1d1b;background:#fff\">\n                    <button on t-size:13px;flex:none\" style-hover=\"background:#e7e9e6;color:#c0392b\">✕<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <button onclick=\"{{wit.onAddDoc}}\" style=\"display:inline-flex;align-items:center;gap:5px;border:1px dashed #b9c2bb;background:var(--accent-tint);color:var(--accent-dark);border-radius:8px;padding:6px 11px;font:600 12px 'Public Sans',sans-serif;cursor:pointer\">+ Add document<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <button onclick=\"{{addWitness}}\" style=\"display:inline-flex;align-items:center;gap:6px;border:1px dashed #b9c2bb;background:#fff;color:#5a615c;border-radius:9px;padding:9px 14px;font:600 13px 'Public Sans',sans-serif;cursor:pointer\" style-hover=\"background:#f3f4f2\">+ Add Witness<\u002Fbutton>\n      <\u002Fsection>\n\n      <!-- INSTRUMENT-LEVEL DOCS -->\n      <section style=\"margin-bottom:10px\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:11px\">\n          <h2 style=\"margin:0;font:700 12px 'Public Sans',sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#5a615c\">Instrument-Level Documents<\u002Fh2>\n          <span style=\"font:600 11px 'Public Sans',sans-serif;color:#fff;background:#9aa19b;border-radius:99px;padding:2px 8px\">{{instDocCount}}<\u002Fspan>\n          <span style=\"font:400 11.5px 'Public Sans',sans-serif;color:#a4aaa5\">optional<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e4e7e3;border-radius:13px;padding:14px\">\n          <div style=\"font:400 12px 'Public Sans',sans-serif;color:#8a908b;margin-bottom:10px\">Documents that belong to the transaction itself, not tied to any person.<\u002Fdiv>\n          <sc-for list=\"{{instDocs}}\" as=\"doc\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex;gap:7px;margin-bottom:7px\">\n              <input value=\"{{doc.label}}\" onchange=\"{{doc.onLabel}}\" placeholder=\"e.g. Power of Attorney, Title Deed\" style=\"flex:1;min-width:0;box-sizing:border-box;padding:9px 11px;border:1px solid #d2d6d1;border-radius:8px;font:400 13.5px 'Public Sans',sans-serif;color:#1a1d1b;background:#fff\">\n              <button onclick=\"{{doc.onRemove}}\" style=\"border:none;background:#f1f2f0;color:#9aa39c;width:34px;border-radius:8px;cursor:pointer;font-size:13px;flex:none\" style-hover=\"background:#e7e9e6;color:#c0392b\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button onclick=\"{{addInstDoc}}\" style=\"display:inline-flex;align-items:center;gap:5px;border:1px dashed #b9c2bb;background:var(--accent-tint);color:var(--accent-dark);border-radius:8px;padding:6px 11px;font:600 12px 'Public Sans',sans-serif;cursor:pointer;margin-top:2px\">+ Add document<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ===== CHECKLIST PANEL ===== -->\n    <div style=\"flex:1 1 400px;min-width:0;position:sticky;top:116px;max-height:calc(100vh - 140px);display:flex;flex-direction:column;background:#fff;border:1px solid #e4e7e3;border-radius:14px;overflow:hidden\">\n      <!-- Panel header -->\n      <div style=\"padding:14px 17px;border-bottom:1px solid #eceeeb;flex:none\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:13px\">\n          <h2 style=\"margin:0;font:700 14px 'Public Sans',sans-serif;color:#1a1d1b\">Checklist<\u002Fh2>\n          <div style=\"display:inline-flex;background:#f1f2f0;border-radius:8px;padding:3px;gap:1px\">\n            <button onclick=\"{{setGrouped}}\" style=\"{{groupedTabStyle}}\">By Person<\u002Fbutton>\n            <button onclick=\"{{setFlat}}\" style=\"{{flatTabStyle}}\">Flat List<\u002Fbutton>\n            <button onclick=\"{{setSummary}}\" style=\"{{summaryTabStyle}}\">Summary<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px\">\n          <span style=\"font:500 12px 'Public Sans',sans-serif;color:#6b716d\">{{summaryText}}<\u002Fspan>\n          <span style=\"font:700 12px 'Public Sans',sans-serif;color:var(--accent-dark)\">{{progressPct}}%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:5px;background:#eceeeb;border-radius:99px;overflow:hidden\">\n          <div style=\"{{progressStyle}}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Panel content -->\n      <div style=\"overflow:auto;padding:14px 17px;flex:1\">\n\n        <!-- Empty state (grouped/flat only) -->\n        <sc-if value=\"{{noContent}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"text-align:center;padding:40px 16px;color:#a4aaa5\">\n            <div style=\"width:40px;height:40px;border:2px dashed #cfd3ce;border-radius:9px;margin:0 auto 12px\"><\u002Fdiv>\n            <div style=\"font:600 13px 'Public Sans',sans-serif;color:#7c837d;margin-bottom:4px\">Your checklist will appear here<\u002Fdiv>\n            <div style=\"font:400 12px 'Public Sans',sans-serif\">Add parties, witnesses or documents to begin.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Grouped view -->\n        <sc-if value=\"{{showGrouped}}\" hint-placeholder-val=\"\">\n          <sc-for list=\"{{nodes}}\" as=\"node\" hint-placeholder-count=\"0\">\n            <div style=\"border:1px solid #eceeeb;border-radius:11px;padding:12px 14px;margin-bottom:10px\">\n              <div style=\"font:700 14px 'Public Sans',sans-serif;color:#1a1d1b\">{{node.person}}<\u002Fdiv>\n              <div style=\"font:600 10px 'Public Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-dark);margin-top:2px\">{{node.cap}}<\u002Fdiv>\n              <sc-if value=\"{{node.sameNote}}\" hint-placeholder-val=\"\"><div style=\"margin-top:6px;font:italic 400 11.5px 'Public Sans',sans-serif;color:var(--accent-dark);background:var(--accent-tint);border-radius:6px;padding:5px 9px\">↳ {{node.sameNote}}<\u002Fdiv><\u002Fsc-if>\n              <sc-for list=\"{{node.items}}\" as=\"item\" hint-placeholder-count=\"0\">\n                <label style=\"display:flex;gap:10px;align-items:flex-start;padding:5px 0;cursor:pointer;margin-top:4px\">\n                  <input type=\"checkbox\" checked=\"{{item.checked}}\" onchange=\"{{item.onToggle}}\" style=\"accent-color:var(--accent);width:16px;height:16px;margin-top:1px;flex:none\">\n                  <span style=\"{{item.textStyle}}\">{{item.labelWithQty}}<\u002Fspan>\n                <\u002Flabel>\n              <\u002Fsc-for>\n              <sc-for list=\"{{node.children}}\" as=\"child\" hint-placeholder-count=\"0\">\n                <div style=\"margin-top:8px;padding-left:12px;border-left:2px solid var(--accent-tint)\">\n                  <div style=\"font:700 13px 'Public Sans',sans-serif;color:#2a2f2c\">{{child.person}}<\u002Fdiv>\n                  <div style=\"font:600 10px 'Public Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#9aa19b;margin-top:2px\">{{child.cap}}<\u002Fdiv>\n                  <sc-if value=\"{{child.sameNote}}\" hint-placeholder-val=\"\"><div style=\"margin-top:5px;font:italic 400 11px 'Public Sans',sans-serif;color:var(--accent-dark);background:var(--accent-tint);border-radius:6px;padding:4px 8px\">↳ {{child.sameNote}}<\u002Fdiv><\u002Fsc-if>\n                  <sc-for list=\"{{child.items}}\" as=\"item\" hint-placeholder-count=\"0\">\n                    <label style=\"display:flex;gap:10px;align-items:flex-start;padding:5px 0;cursor:pointer;margin-top:3px\">\n                      <input type=\"checkbox\" checked=\"{{item.checked}}\" onchange=\"{{item.onToggle}}\" style=\"accent-color:var(--accent);width:16px;height:16px;margin-top:1px;flex:none\">\n                      <span style=\"{{item.textStyle}}\">{{item.labelWithQty}}<\u002Fspan>\n                    <\u002Flabel>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n\n        <!-- Flat view -->\n        <sc-if value=\"{{showFlat}}\" hint-placeholder-val=\"\">\n          <sc-for list=\"{{flatRows}}\" as=\"row\" hint-placeholder-count=\"0\">\n            <label style=\"display:flex;gap:10px;align-items:flex-start;padding:9px 2px;border-bottom:1px solid #f1f2f0;cursor:pointer\">\n              <input type=\"checkbox\" checked=\"{{row.checked}}\" onchange=\"{{row.onToggle}}\" style=\"accent-color:var(--accent);width:16px;height:16px;margin-top:2px;flex:none\">\n              <span style=\"min-width:0\">\n                <span style=\"display:block;{{row.textStyle}}\">{{row.labelWithQty}}<\u002Fspan>\n                <span style=\"display:block;font:500 11px 'Public Sans',sans-serif;color:#9aa19b;margin-top:2px\">{{row.meta}}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Flabel>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n\n        <!-- Summary view -->\n        <sc-if value=\"{{showSummary}}\" hint-placeholder-val=\"\">\n          <sc-if value=\"{{noSummary}}\" hint-placeholder-val=\"\">\n            <div style=\"text-align:center;padding:40px 16px\">\n              <div style=\"font:600 13px 'Public Sans',sans-serif;color:#7c837d;margin-bottom:4px\">No data yet<\u002Fdiv>\n              <div style=\"font:400 12px 'Public Sans',sans-serif;color:#a4aaa5\">Add parties to see the per-person summary.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <!-- Overall total pill -->\n          <sc-if value=\"{{hasSummary}}\" hint-placeholder-val=\"\">\n            <div style=\"background:var(--accent);color:#fff;border-radius:9px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center\">\n              <span style=\"font:600 12.5px 'Public Sans',sans-serif\">All instruments — total<\u002Fspan>\n              <span style=\"font:700 13.5px 'Public Sans',sans-serif\">{{overallTotalLabel}}<\u002Fspan>\n            <\u002Fdiv>\n            <!-- Table header -->\n            <div style=\"display:grid;grid-template-columns:1fr 2fr 40px;background:#f5f9f7;border:1px solid #d0e8da;border-radius:8px 8px 0 0;padding:5px 10px 5px 12px\">\n              <div style=\"font:700 9px 'Public Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#4a8a6a\">Instrument · Role<\u002Fdiv>\n              <div style=\"font:700 9px 'Public Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#4a8a6a\">Document Required<\u002Fdiv>\n              <div style=\"font:700 9px 'Public Sans',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#4a8a6a;text-align:center\">Qty<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{summaryTableGroups}}\" as=\"stg\" hint-placeholder-count=\"0\">\n              <!-- Person header row -->\n              <div style=\"display:grid;grid-template-columns:1fr 2fr 40px;border:1px solid #d0e8da;border-top:none;padding:7px 10px 7px 12px;background:var(--accent-tint)\">\n                <div style=\"grid-column:1/3;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap\">\n                  <span style=\"font:700 12px 'Public Sans',sans-serif;color:var(--accent-dark)\">{{stg.displayName}}<\u002Fspan>\n                  <sc-if value=\"{{stg.isLinked}}\" hint-placeholder-val=\"\"><span style=\"font:500 10px 'Public Sans',sans-serif;color:var(--accent)\">{{stg.linkedNote}}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font:700 12px 'Public Sans',sans-serif;color:var(--accent-dark);text-align:center\">{{stg.total}}<\u002Fdiv>\n              <\u002Fdiv>\n              <!-- Document rows for this person -->\n              <sc-for list=\"{{stg.rows}}\" as=\"strow\" hint-placeholder-count=\"0\">\n                <div style=\"display:grid;grid-template-columns:1fr 2fr 40px;border:1px solid #eceeeb;border-top:none;padding:6px 10px 6px 12px;background:#fff\">\n                  <div>\n                    <div style=\"font:500 11.5px 'Public Sans',sans-serif;color:#2a2f2c;line-height:1.3\">{{strow.instTitle}}<\u002Fdiv>\n                    <div style=\"font:600 9px 'Public Sans',sans-serif;letter-spacing:.05em;text-transform:uppercase;color:#9aa19b;margin-top:1px\">{{strow.cap}}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font:400 11.5px 'Public Sans',sans-serif;color:#1a1d1b;line-height:1.35;padding-right:4px\">{{strow.doc}}<\u002Fdiv>\n                  <div style=\"font:700 12px 'Public Sans',sans-serif;color:var(--accent-dark);text-align:center;padding-top:2px\">{{strow.qtyStr}}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-for>\n            <div style=\"height:5px;background:var(--accent-tint);border:1px solid #d0e8da;border-top:none;border-radius:0 0 8px 8px;margin-bottom:6px\"><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===== PRINT DOC ===== -->\n<div id=\"print-doc\" style=\"padding:0;font-family:'Public Sans',sans-serif;color:#1a1d1b\">\n  <div style=\"font:700 26px 'Source Serif 4',Georgia,serif;color:#111;line-height:1.15\">{{printTitle}}<\u002Fdiv>\n  <div style=\"font:600 11px 'Public Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#666;margin:5px 0 4px\">Document Checklist<\u002Fdiv>\n  <div style=\"height:2px;background:#222;margin-bottom:18px\"><\u002Fdiv>\n  <sc-for list=\"{{nodes}}\" as=\"node\" hint-placeholder-count=\"0\">\n    <div style=\"margin-bottom:16px;break-inside:avoid\">\n      <div style=\"font:700 15px 'Public Sans',sans-serif;color:#111\">{{node.person}}<\u002Fdiv>\n      <div style=\"font:600 10px 'Public Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#777;margin:2px 0 6px\">{{node.cap}}<\u002Fdiv>\n      <sc-if value=\"{{node.sameNote}}\" hint-placeholder-val=\"\"><div style=\"font:italic 400 11px 'Public Sans',sans-serif;color:#444;margin-bottom:5px\">↳ {{node.sameNote}}<\u002Fdiv><\u002Fsc-if>\n      <sc-for list=\"{{node.items}}\" as=\"item\" hint-placeholder-count=\"0\">\n        <div style=\"display:flex;gap:9px;align-items:flex-start;padding:3px 0\">\n          <span style=\"display:inline-block;width:12px;height:12px;border:1.5px solid #444;border-radius:2px;margin-top:2px;flex:none\"><\u002Fspan>\n          <span style=\"font:400 12.5px 'Public Sans',sans-serif;color:#222\">{{item.labelWithQty}}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-for list=\"{{node.children}}\" as=\"child\" hint-placeholder-count=\"0\">\n        <div style=\"margin:8px 0 0 14px\">\n          <div style=\"font:700 13px 'Public Sans',sans-serif;color:#222\">{{child.person}}<\u002Fdiv>\n          <div style=\"font:600 9.5px 'Public Sans',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#888;margin:2px 0 5px\">{{child.cap}}<\u002Fdiv>\n          <sc-if value=\"{{child.sameNote}}\" hint-placeholder-val=\"\"><div style=\"font:italic 400 11px 'Public Sans',sans-serif;color:#555;margin-bottom:4px\">↳ {{child.sameNote}}<\u002Fdiv><\u002Fsc-if>\n          <sc-for list=\"{{child.items}}\" as=\"item\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex;gap:9px;align-items:flex-start;padding:3px 0\">\n              <span style=\"display:inline-block;width:12px;height:12px;border:1.5px solid #444;border-radius:2px;margin-top:2px;flex:none\"><\u002Fspan>\n              <span style=\"font:400 12.5px 'Public Sans',sans-serif;color:#222\">{{item.labelWithQty}}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Forest green&quot;,&quot;Navy&quot;,&quot;Burgundy&quot;,&quot;Slate&quot;],&quot;default&quot;:&quot;Forest green&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;grouped&quot;,&quot;flat&quot;,&quot;summary&quot;],&quot;default&quot;:&quot;grouped&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;witnessIdDefault&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { instruments:[], activeId:null, view:'grouped' };\n\n  uid(){ this._n=(this._n||0)+1; return 'k'+this._n+'_'+Math.random().toString(36).slice(2,5); }\n  mutate(fn){ this.setState(s=>{ const n=structuredClone(s); fn(n); return n; }); }\n\n  componentDidMount(){\n    this.mutate(s=>{\n      if(!s.instruments.length){\n        const id=this.uid();\n        s.instruments.push({id,title:'',parties:[],witnesses:[],instDocs:[],checked:{}});\n        s.activeId=id;\n      }\n    });\n    this.applyTheme();\n  }\n  componentDidUpdate(){ this.applyTheme(); }\n  applyTheme(){\n    const map={'Forest green':['#1f5c3d','#eaf1ec','#163f2a'],'Navy':['#1e3a5f','#e7edf3','#142a47'],'Burgundy':['#6e2230','#f4e8ea','#511822'],'Slate':['#3a4250','#eaecef','#272d37']};\n    const t=map[this.props.theme]||map['Forest green'];\n    const r=document.documentElement.style;\n    r.setProperty('--accent',t[0]); r.setProperty('--accent-tint',t[1]); r.setProperty('--accent-dark',t[2]);\n  }\n\n  activeInst(s){ return s.instruments.find(i=>i.id===s.activeId)||s.instruments[0]||{parties:[],witnesses:[],instDocs:[],checked:{},title:''}; }\n\n  // --- Instrument management ---\n  addInstrument(){ this.mutate(s=>{ const id=this.uid(); s.instruments.push({id,title:'',parties:[],witnesses:[],instDocs:[],checked:{}}); s.activeId=id; }); }\n  removeInstrument(id){ this.mutate(s=>{ s.instruments=s.instruments.filter(i=>i.id!==id); if(s.activeId===id) s.activeId=(s.instruments[0]||{}).id||null; }); }\n  setActive(id){ this.mutate(s=>{ s.activeId=id; }); }\n  setTitle(v){ this.mutate(s=>{ const i=this.activeInst(s); i.title=v; }); }\n  setView(v){ this.mutate(s=>{ s.view=v; }); }\n\n  // --- Parties ---\n  addNatural(){ this.mutate(s=>{ this.activeInst(s).parties.push({id:this.uid(),type:'natural',name:'',extraDocs:[],sameAsId:'',idQty:1}); }); }\n  addCompany(){ this.mutate(s=>{ this.activeInst(s).parties.push({id:this.uid(),type:'company',name:'',extraDocs:[],regQty:1,directors:[{id:this.uid(),name:'',extraDocs:[],sameAsId:'',idQty:1}]}); }); }\n  removeParty(id){ this.mutate(s=>{ const i=this.activeInst(s); i.parties=i.parties.filter(p=>p.id!==id); }); }\n  setParty(id,patch){ this.mutate(s=>{ const p=this.activeInst(s).parties.find(p=>p.id===id); if(p)Object.assign(p,patch); }); }\n\n  // --- Directors ---\n  addDirector(cid){ this.mutate(s=>{ const c=this.activeInst(s).parties.find(p=>p.id===cid); if(c)c.directors.push({id:this.uid(),name:'',extraDocs:[],sameAsId:'',idQty:1}); }); }\n  removeDirector(cid,did){ this.mutate(s=>{ const c=this.activeInst(s).parties.find(p=>p.id===cid); if(c)c.directors=c.directors.filter(d=>d.id!==did); }); }\n  setDirector(cid,did,patch){ this.mutate(s=>{ const c=this.activeInst(s).parties.find(p=>p.id===cid); const d=c&&c.directors.find(d=>d.id===did); if(d)Object.assign(d,patch); }); }\n\n  // --- Extra docs ---\n  _docArr(s,o){\n    const inst=this.activeInst(s);\n    if(o.kind==='party'){ const p=inst.parties.find(p=>p.id===o.id); return p&&p.extraDocs; }\n    if(o.kind==='director'){ const c=inst.parties.find(p=>p.id===o.cid); const d=c&&c.directors.find(d=>d.id===o.did); return d&&d.extraDocs; }\n    if(o.kind==='witness'){ const w=inst.witnesses.find(w=>w.id===o.id); return w&&w.extraDocs; }\n    return null;\n  }\n  addDoc(o){ this.mutate(s=>{ const a=this._docArr(s,o); if(a)a.push({id:this.uid(),label:'',qty:1}); }); }\n  setDoc(o,docId,label){ this.mutate(s=>{ const a=this._docArr(s,o); const d=a&&a.find(x=>x.id===docId); if(d)d.label=label; }); }\n  setDocQty(o,docId,qty){ this.mutate(s=>{ const a=this._docArr(s,o); const d=a&&a.find(x=>x.id===docId); if(d)d.qty=Math.max(1,qty); }); }\n  removeDoc(o,docId){ this.mutate(s=>{ const a=this._docArr(s,o); if(a){ const i=a.findIndex(x=>x.id===docId); if(i>=0)a.splice(i,1); } }); }\n\n  // --- Witnesses ---\n  addWitness(){ const def=this.props.witnessIdDefault!==false; this.mutate(s=>{ this.activeInst(s).witnesses.push({id:this.uid(),name:'',idRequired:def,extraDocs:[],sameAsId:'',idQty:1}); }); }\n  removeWitness(id){ this.mutate(s=>{ const i=this.activeInst(s); i.witnesses=i.witnesses.filter(w=>w.id!==id); }); }\n  setWitness(id,patch){ this.mutate(s=>{ const w=this.activeInst(s).witnesses.find(w=>w.id===id); if(w)Object.assign(w,patch); }); }\n\n  // --- Instrument docs ---\n  addInstDoc(){ this.mutate(s=>{ this.activeInst(s).instDocs.push({id:this.uid(),label:'',qty:1}); }); }\n  setInstDoc(id,label){ this.mutate(s=>{ const d=this.activeInst(s).instDocs.find(d=>d.id===id); if(d)d.label=label; }); }\n  removeInstDoc(id){ this.mutate(s=>{ const i=this.activeInst(s); i.instDocs=i.instDocs.filter(d=>d.id!==id); }); }\n\n  // --- Checklist ---\n  toggleCheck(k){ this.mutate(s=>{ const ck=this.activeInst(s).checked; ck[k]=!ck[k]; }); }\n\n  // --- Tree builder ---\n  buildTreeFor(inst){\n    const nm=(x,role)=> (x&&x.trim())? x : ('Unnamed '+role);\n    const appearances=[];\n    (inst.parties||[]).forEach(p=>{\n      if(p.type==='natural') appearances.push({id:p.id,name:p.name,cap:'Party'});\n      if(p.type==='company') (p.directors||[]).forEach(d=>appearances.push({id:d.id,name:d.name,cap:'Director of '+(p.name&&p.name.trim()?p.name:'company')}));\n    });\n    (inst.witnesses||[]).forEach(w=>appearances.push({id:w.id,name:w.name,cap:'Witness'}));\n    const by={}; appearances.forEach(a=>by[a.id]=a);\n    const note=(id)=>{ if(!id) return ''; const t=by[id]; return t? 'Same physical person as '+(t.name&&t.name.trim()?t.name:'Unnamed')+' ('+t.cap+')':''; };\n    const ck=inst.checked||{};\n    const I=(key,label,qty)=>{ const q=qty||1; return {key,label,qty:q,labelWithQty:q>1?q+'× '+label:label,checked:!!ck[key]}; };\n    const nodes=[];\n    (inst.parties||[]).forEach(p=>{\n      if(p.type==='natural'){\n        const items=[I(p.id+':id','Certified copy of ID — signed in capacity as party',p.idQty||1)];\n        (p.extraDocs||[]).forEach(d=>{ if(d.label&&d.label.trim()) items.push(I(d.id,d.label.trim(),d.qty||1)); });\n        nodes.push({id:p.id,person:nm(p.name,'Party'),cap:'Natural Person · Party',sameNote:note(p.sameAsId),items,children:[]});\n      } else {\n        const cname=p.name&&p.name.trim()?p.name:'the company';\n        const items=[I(p.id+':reg','Certified copy of company registration document',p.regQty||1)];\n        (p.extraDocs||[]).forEach(d=>{ if(d.label&&d.label.trim()) items.push(I(d.id,d.label.trim(),d.qty||1)); });\n        const children=(p.directors||[]).map(d=>{\n          const ditems=[I(d.id+':id','Certified copy of ID — signed in capacity as director of '+cname,d.idQty||1)];\n          (d.extraDocs||[]).forEach(x=>{ if(x.label&&x.label.trim()) ditems.push(I(x.id,x.label.trim(),x.qty||1)); });\n          return {id:d.id,person:nm(d.name,'Director'),cap:'Director of '+cname,sameNote:note(d.sameAsId),items:ditems,children:[]};\n        });\n        nodes.push({id:p.id,person:nm(p.name,'Company'),cap:'Juristic Person · Company',sameNote:'',items,children});\n      }\n    });\n    (inst.witnesses||[]).forEach(w=>{\n      const items=[];\n      if(w.idRequired) items.push(I(w.id+':id','Certified copy of ID — signed in capacity as witness',w.idQty||1));\n      (w.extraDocs||[]).forEach(d=>{ if(d.label&&d.label.trim()) items.push(I(d.id,d.label.trim(),d.qty||1)); });\n      nodes.push({id:w.id,person:nm(w.name,'Witness'),cap:'Witness',sameNote:note(w.sameAsId),items,children:[]});\n    });\n    const inst2=[];\n    (inst.instDocs||[]).forEach(d=>{ if(d.label&&d.label.trim()) inst2.push(I('inst:'+d.id,d.label.trim(),d.qty||1)); });\n    if(inst2.length) nodes.push({id:'instrument',person:'Instrument-Level Documents',cap:'Transaction',sameNote:'',items:inst2,children:[]});\n    return nodes;\n  }\n\n  // --- PDF Export ---\n  exportPdf(){\n    const J=window.jspdf&&window.jspdf.jsPDF; if(!J){ alert('PDF library still loading — try again shortly.'); return; }\n    const S=this.state; const inst=this.activeInst(S); const nodes=this.buildTreeFor(inst);\n    const doc=new J({unit:'pt',format:'a4'});\n    const M=48,W=595-M*2; let y=58;\n    const page=(h)=>{ if(y+(h||0)>792){ doc.addPage(); y=58; } };\n    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(17);\n    doc.text(inst.title&&inst.title.trim()?inst.title:'Untitled Instrument',M,y); y+=20;\n    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(110);\n    doc.text('DOCUMENT CHECKLIST',M,y); y+=8;\n    doc.setDrawColor(34); doc.setLineWidth(1.3); doc.line(M,y,M+W,y); y+=18;\n    const item=(it,ind)=>{\n      doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(40);\n      const lines=doc.splitTextToSize((it.checked?'[x]  ':'[  ]  ')+it.labelWithQty,W-ind);\n      page(lines.length*14); doc.text(lines,M+ind,y); y+=lines.length*14+1;\n    };\n    const node=(n,ind)=>{\n      page(44); doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(20);\n      doc.text(n.person,M+ind,y); y+=14;\n      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(120);\n      doc.text(n.cap.toUpperCase(),M+ind,y); y+=13;\n      if(n.sameNote){ doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.setTextColor(90); page(12); doc.text('* '+n.sameNote,M+ind,y); y+=13; }\n      n.items.forEach(it=>item(it,ind+4));\n      n.children.forEach(c=>{ y+=4; node(c,ind+16); });\n      y+=12;\n    };\n    nodes.forEach(n=>node(n,0));\n    const safe=(inst.title&&inst.title.trim()?inst.title:'Instrument').replace(/[^a-z0-9 ]/gi,'').trim()||'Instrument';\n    doc.save('Checklist - '+safe+'.pdf');\n  }\n\n  renderVals(){\n    const S=this.state, self=this;\n    const view=S.view||'grouped';\n    const inst=this.activeInst(S);\n\n    // Instrument tabs\n    const tabActive=\"display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:6px 10px 6px 13px;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;flex:none;user-select:none\";\n    const tabInactive=\"display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:6px 10px 6px 13px;background:transparent;color:#5a615c;cursor:pointer;white-space:nowrap;flex:none;user-select:none\";\n    const instTabs=(S.instruments||[]).map(i=>{\n      const raw=i.title&&i.title.trim()?i.title:'New Instrument';\n      return {\n        id:i.id, displayTitle:raw.length>22?raw.substring(0,20)+'…':raw,\n        isActive:i.id===S.activeId, wrapStyle:i.id===S.activeId?tabActive:tabInactive,\n        onClick:()=>self.setActive(i.id),\n        canRemove:(S.instruments||[]).length>1,\n        onRemoveStop:e=>{ e.stopPropagation(); self.removeInstrument(i.id); }\n      };\n    });\n\n    // Appearances for same-person linking — includes cross-instrument\n    const allGlobalApps=[];\n    (S.instruments||[]).forEach(gi=>{\n      const gt=gi.title&&gi.title.trim()?gi.title:'Untitled';\n      (gi.parties||[]).forEach(p=>{\n        if(p.type==='natural') allGlobalApps.push({id:p.id,name:p.name,cap:'Party',instId:gi.id,instTitle:gt});\n        if(p.type==='company') (p.directors||[]).forEach(d=>allGlobalApps.push({id:d.id,name:d.name,cap:'Director of '+(p.name&&p.name.trim()?p.name:'company'),instId:gi.id,instTitle:gt}));\n      });\n      (gi.witnesses||[]).forEach(w=>allGlobalApps.push({id:w.id,name:w.name,cap:'Witness',instId:gi.id,instTitle:gt}));\n    });\n    const optsFor=(id)=>allGlobalApps.filter(a=>a.id!==id).map(a=>({id:a.id,label:(a.name&&a.name.trim()?a.name:'Unnamed')+' — '+a.cap+(a.instId!==S.activeId?' ('+a.instTitle+')':'')}));\n    const docEnrich=(arr,owner)=>(arr||[]).map(d=>({id:d.id,label:d.label,onLabel:e=>self.setDoc(owner,d.id,e.target.value),onRemove:()=>self.removeDoc(owner,d.id)}));\n\n    // Enrich parties\n    const parties=(inst.parties||[]).map(p=>{\n      if(p.type==='natural'){\n        const owner={kind:'party',id:p.id}; const lo=optsFor(p.id);\n        const partyDocs=[\n          {label:'Certified copy of ID — signed in capacity as party',qty:p.idQty||1,onQty:e=>self.setParty(p.id,{idQty:Math.max(1,parseInt(e.target.value)||1)})},\n          ...(p.extraDocs||[]).filter(d=>d.label&&d.label.trim()).map(d=>({label:d.label.trim(),qty:d.qty||1,onQty:e=>self.setDocQty(owner,d.id,Math.max(1,parseInt(e.target.value)||1))}))\n        ];\n        return {id:p.id,isNatural:true,isCompany:false,typeLabel:'Natural Person',name:p.name,\n          onName:e=>self.setParty(p.id,{name:e.target.value}),onRemove:()=>self.removeParty(p.id),\n          extraDocs:docEnrich(p.extraDocs,owner),onAddDoc:()=>self.addDoc(owner),\n          hasLinks:lo.length>0,linkOptions:lo,sameAsId:p.sameAsId||'',onLink:e=>self.setParty(p.id,{sameAsId:e.target.value}),\n          partyDocs,directors:[],onAddDirector:()=>{}};\n      }\n      const owner={kind:'party',id:p.id};\n      const rcname=p.name&&p.name.trim()?p.name:'the company';\n      const directors=(p.directors||[]).map(d=>{\n        const dn={kind:'director',cid:p.id,did:d.id}; const lo=optsFor(d.id);\n        const dirDocs=[\n          {label:'Certified copy of ID — signed in capacity as director of '+rcname,qty:d.idQty||1,onQty:e=>self.setDirector(p.id,d.id,{idQty:Math.max(1,parseInt(e.target.value)||1)})},\n          ...(d.extraDocs||[]).filter(x=>x.label&&x.label.trim()).map(x=>({label:x.label.trim(),qty:x.qty||1,onQty:e=>self.setDocQty(dn,x.id,Math.max(1,parseInt(e.target.value)||1))}))\n        ];\n        return {id:d.id,name:d.name,onName:e=>self.setDirector(p.id,d.id,{name:e.target.value}),onRemove:()=>self.removeDirector(p.id,d.id),\n          extraDocs:docEnrich(d.extraDocs,dn),onAddDoc:()=>self.addDoc(dn),\n          hasLinks:lo.length>0,linkOptions:lo,sameAsId:d.sameAsId||'',onLink:e=>self.setDirector(p.id,d.id,{sameAsId:e.target.value}),dirDocs};\n      });\n      const partyDocs=[\n        {label:'Certified copy of company registration document',qty:p.regQty||1,onQty:e=>self.setParty(p.id,{regQty:Math.max(1,parseInt(e.target.value)||1)})},\n        ...(p.extraDocs||[]).filter(d=>d.label&&d.label.trim()).map(d=>({label:d.label.trim(),qty:d.qty||1,onQty:e=>self.setDocQty(owner,d.id,Math.max(1,parseInt(e.target.value)||1))}))\n      ];\n      return {id:p.id,isNatural:false,isCompany:true,typeLabel:'Company',name:p.name,\n        onName:e=>self.setParty(p.id,{name:e.target.value}),onRemove:()=>self.removeParty(p.id),\n        extraDocs:docEnrich(p.extraDocs,owner),onAddDoc:()=>self.addDoc(owner),\n        hasLinks:false,linkOptions:[],sameAsId:'',onLink:()=>{},\n        partyDocs,directors,onAddDirector:()=>self.addDirector(p.id)};\n    });\n\n    // Enrich witnesses\n    const witnesses=(inst.witnesses||[]).map(w=>{\n      const owner={kind:'witness',id:w.id}; const lo=optsFor(w.id);\n      const witDocs=[\n        ...(w.idRequired?[{label:'Certified copy of ID — signed in capacity as witness',qty:w.idQty||1,onQty:e=>self.setWitness(w.id,{idQty:Math.max(1,parseInt(e.target.value)||1)})}]:[]),\n        ...(w.extraDocs||[]).filter(d=>d.label&&d.label.trim()).map(d=>({label:d.label.trim(),qty:d.qty||1,onQty:e=>self.setDocQty(owner,d.id,Math.max(1,parseInt(e.target.value)||1))}))\n      ];\n      return {id:w.id,name:w.name,onName:e=>self.setWitness(w.id,{name:e.target.value}),onRemove:()=>self.removeWitness(w.id),\n        idRequired:w.idRequired,onToggleId:e=>self.setWitness(w.id,{idRequired:e.target.checked}),\n        extraDocs:docEnrich(w.extraDocs,owner),onAddDoc:()=>self.addDoc(owner),\n        hasLinks:lo.length>0,linkOptions:lo,sameAsId:w.sameAsId||'',onLink:e=>self.setWitness(w.id,{sameAsId:e.target.value}),\n        witDocs,noWitDocs:witDocs.length===0};\n    });\n\n    const instDocs=(inst.instDocs||[]).map(d=>({id:d.id,label:d.label,onLabel:e=>self.setInstDoc(d.id,e.target.value),onRemove:()=>self.removeInstDoc(d.id)}));\n\n    // Checklist tree with live handlers\n    const tree=this.buildTreeFor(inst);\n    const txt=(c)=>c?\"font:400 13.5px 'Public Sans',sans-serif;color:#a4aaa5;text-decoration:line-through\":\"font:400 13.5px 'Public Sans',sans-serif;color:#2a2f2c;line-height:1.35\";\n    const liveItem=it=>({...it,textStyle:txt(it.checked),onToggle:()=>self.toggleCheck(it.key)});\n    const nodes=tree.map(n=>({...n,items:n.items.map(liveItem),children:n.children.map(c=>({...c,items:c.items.map(liveItem)}))}));\n    const flatRows=[];\n    nodes.forEach(n=>{\n      n.items.forEach(it=>flatRows.push({...it,meta:n.person+' · '+n.cap}));\n      n.children.forEach(c=>c.items.forEach(it=>flatRows.push({...it,meta:c.person+' · '+c.cap})));\n    });\n\n    // Progress\n    const total=flatRows.length, done=flatRows.filter(r=>r.checked).length;\n    const pct=total?Math.round(done/total*100):0;\n    const hasContent=nodes.length>0;\n\n    // Summary table — global union-find across ALL instruments\n    const allRawUF=[];\n    (S.instruments||[]).forEach(gi=>{\n      (gi.parties||[]).forEach(p=>{\n        if(p.type==='natural') allRawUF.push({id:p.id,sameAsId:p.sameAsId||''});\n        if(p.type==='company') (p.directors||[]).forEach(d=>allRawUF.push({id:d.id,sameAsId:d.sameAsId||''}));\n      });\n      (gi.witnesses||[]).forEach(w=>allRawUF.push({id:w.id,sameAsId:w.sameAsId||''}));\n    });\n    const ufP={};\n    allRawUF.forEach(a=>{ufP[a.id]=a.id;});\n    const ufF=id=>{if(!ufP[id])return id;if(ufP[id]===id)return id;ufP[id]=ufF(ufP[id]);return ufP[id];};\n    allRawUF.forEach(a=>{if(a.sameAsId&&ufP[a.sameAsId]!==undefined)ufP[ufF(a.id)]=ufF(a.sameAsId);});\n    const gDocRows=[];\n    (S.instruments||[]).forEach(gi=>{\n      const iTitle=gi.title&&gi.title.trim()?gi.title:'Untitled Instrument';\n      this.buildTreeFor(gi).forEach(n=>{\n        if(n.id==='instrument'){\n          n.items.forEach(it=>gDocRows.push({physRoot:'idoc:'+gi.id,personId:'idoc:'+gi.id,displayName:'Instrument Documents',cap:'Transaction',instTitle:iTitle,doc:it.label,qty:it.qty}));\n        } else {\n          const root=ufF(n.id);\n          n.items.forEach(it=>gDocRows.push({physRoot:root,personId:n.id,displayName:n.person,cap:n.cap,instTitle:iTitle,doc:it.label,qty:it.qty}));\n          n.children.forEach(c=>{\n            const cr=ufF(c.id);\n            c.items.forEach(it=>gDocRows.push({physRoot:cr,personId:c.id,displayName:c.person,cap:c.cap,instTitle:iTitle,doc:it.label,qty:it.qty}));\n          });\n        }\n      });\n    });\n    const stgOrder=[],stgMap={};\n    gDocRows.forEach(row=>{\n      if(!stgMap[row.physRoot]){stgMap[row.physRoot]={displayName:'',rows:[],total:0};stgOrder.push(row.physRoot);}\n      stgMap[row.physRoot].rows.push(row);\n      stgMap[row.physRoot].total+=row.qty;\n      if(!stgMap[row.physRoot].displayName&&row.displayName&&!row.displayName.startsWith('Unnamed'))stgMap[row.physRoot].displayName=row.displayName;\n    });\n    const summaryTableGroups=stgOrder.map((root,stgIdx)=>{\n      const g=stgMap[root];\n      const name=g.displayName||(g.rows[0]&&g.rows[0].displayName)||'Unnamed';\n      const uniqPersons=[...new Set(g.rows.map(r=>r.personId))];\n      const isLinked=uniqPersons.length>1;\n      const uniqInsts=[...new Set(g.rows.map(r=>r.instTitle))];\n      return {\n        physRoot:root,displayName:name,total:g.total,\n        totalLabel:g.total+' doc'+(g.total===1?'':'s'),\n        isLinked,linkedNote:isLinked?'Same person · '+uniqInsts.length+' instrument'+(uniqInsts.length===1?'':'s'):'',\n        rows:g.rows.map(r=>({...r,qtyStr:r.qty+'×'}))\n      };\n    });\n    const hasSummary=summaryTableGroups.length>0;\n    const overallTotal=summaryTableGroups.reduce((s,g)=>s+g.total,0);\n\n    // Tab styles\n    const mkTab=(active)=>active?\"border:none;border-radius:6px;padding:5px 10px;font:600 12px 'Public Sans',sans-serif;cursor:pointer;background:#fff;color:#1a1d1b;box-shadow:0 1px 2px rgba(0,0,0,.09)\":\"border:none;border-radius:6px;padding:5px 10px;font:600 12px 'Public Sans',sans-serif;cursor:pointer;background:transparent;color:#8a908b\";\n\n    return {\n      activeTitle:inst.title, onTitle:e=>self.setTitle(e.target.value),\n      printTitle:inst.title&&inst.title.trim()?inst.title:'Untitled Instrument',\n      instTabs, addInstrument:()=>self.addInstrument(),\n      parties, partyCount:(inst.parties||[]).length, noParties:!(inst.parties||[]).length,\n      witnesses, witnessCount:(inst.witnesses||[]).length,\n      instDocs, instDocCount:(inst.instDocs||[]).length,\n      addNatural:()=>self.addNatural(), addCompany:()=>self.addCompany(),\n      addWitness:()=>self.addWitness(), addInstDoc:()=>self.addInstDoc(),\n      setGrouped:()=>self.setView('grouped'), setFlat:()=>self.setView('flat'), setSummary:()=>self.setView('summary'),\n      groupedTabStyle:mkTab(view==='grouped'), flatTabStyle:mkTab(view==='flat'), summaryTabStyle:mkTab(view==='summary'),\n      showGrouped:hasContent&&view==='grouped', showFlat:hasContent&&view==='flat', showSummary:view==='summary',\n      noContent:!hasContent&&view!=='summary', hasSummary, noSummary:!hasSummary&&view==='summary',\n      nodes, flatRows,\n      progressPct:pct, progressStyle:'width:'+pct+'%;height:100%;background:var(--accent);border-radius:99px;transition:width .3s',\n      summaryText:total+' item'+(total===1?'':'s')+' • '+done+' checked',\n      summaryTableGroups, overallTotalLabel:overallTotal+' document'+(overallTotal===1?'':'s')+' total',\n      onPrint:()=>window.print(), onPdf:()=>self.exportPdf(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
